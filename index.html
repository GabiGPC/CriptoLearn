<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoGuia</title>

  <!-- CSS externo -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">
  <div class="hdr">
    <div class="logo">Crypto<span>Guia</span></div>
    <div class="hdr-pills">
      <div class="pill">🔥 <span id="streak-count">1</span> d</div>
      <div class="pill xp">⚡ <span id="xp-count">0</span> XP</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('learn')">Aprender</div>
    <div class="tab" onclick="switchTab('wallet')">Carteira</div>
  </div>

  <!-- LEARN -->
  <div class="screen active" id="sc-learn">
    <div id="trail-list">
      <div class="xp-bar-wrap">
        <div class="xp-row">
          <span id="prog-label">0 de 8 módulos</span>
          <strong id="xp-label2">0 XP</strong>
        </div>
        <div class="xp-bar">
          <div class="xp-fill" id="xp-fill"></div>
        </div>
      </div>
      <div id="mods-wrap"></div>
    </div>

    <div id="lesson-view" style="display:none;">
      <button class="back-btn" onclick="backToTrail()">← Trilha</button>
      <div id="lesson-content"></div>
    </div>
  </div>

  <!-- WALLET -->
  <div class="screen" id="sc-wallet">
    <div id="wallet-list-view">
      <div class="wallet-topbar">
        <h2>Minhas Carteiras</h2>
        <button class="btn-primary" onclick="openModal('modal-wallet')">+ Nova</button>
      </div>
      <div id="wallet-list"></div>
    </div>

    <div id="wallet-detail" style="display:none;">
      <button class="back-btn" onclick="backWallets()">← Carteiras</button>
      <div id="d-name"></div>

      <div class="stabs">
        <button class="stab active" onclick="stab('txs')">Transações</button>
        <button class="stab" onclick="stab('chart')">Performance</button>
      </div>

      <div id="st-txs">
        <div id="tx-list-wrap"></div>
        <button class="add-tx-btn" onclick="openModal('modal-tx')">
          + Adicionar transação
        </button>
      </div>

      <div id="st-chart" style="display:none;">
        <!-- conteúdo mantido igual -->
      </div>
    </div>
  </div>
</div>

<!-- MODAIS (mantém igual) -->

<!-- JS externo -->
<script src="app.js"></script>

</body>
</html>
