<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CryptoLearn</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Celebration Overlay -->
<div id="celebration" class="celebration-overlay hidden">
  <div class="celebration-content">
    <div class="celebration-emoji">🎉</div>
    <h2 class="celebration-title">Parabéns!</h2>
    <p class="celebration-msg">+50 XP conquistados!</p>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="logo">CryptoLearn</div>
        <div class="logo-sub">Aprenda e acompanhe seus investimentos</div>
      </div>
      <div class="xp-box">
        <div class="xp-level" id="xpLevel">Nível 1</div>
        <div class="xp-value" id="xpValue">0 XP</div>
      </div>
    </div>
    <div class="main-tabs">
      <button class="main-tab active" id="tabLearn" onclick="switchMainTab('learn')">📚 Aprender</button>
      <button class="main-tab" id="tabPortfolio" onclick="switchMainTab('portfolio')">💼 Carteira</button>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="content" id="content"></div>

<script src="app.js"></script>
</body>
</html>
